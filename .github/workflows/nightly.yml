name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every night
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Publish nightly ${{ matrix.binary }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - binary: alice-server
            cmd_path: cmd/server
          - binary: alice-mcp-server
            cmd_path: cmd/mcp-server
          - binary: alice-edge-agent
            cmd_path: cmd/edge-agent
          - binary: alice-gc
            cmd_path: cmd/alice-gc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nightly
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.binary }}:nightly
          build-args: CMD_PATH=${{ matrix.cmd_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
