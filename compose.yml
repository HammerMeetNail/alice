services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alice-server
    environment:
      ALICE_LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
