name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.23"
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push ${{ matrix.binary }}
    runs-on: ubuntu-latest
    permissions:
      contents: write      # upload release assets
      packages: write      # push to GHCR
      id-token: write      # Cosign keyless OIDC signing
    strategy:
      matrix:
        include:
          - binary: alice-server
            cmd_path: cmd/server
          - binary: alice-mcp-server
            cmd_path: cmd/mcp-server
          - binary: alice-edge-agent
            cmd_path: cmd/edge-agent
          - binary: alice-gc
            cmd_path: cmd/alice-gc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.binary }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CMD_PATH=${{ matrix.cmd_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.binary }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.binary }}.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.binary }}@${{ steps.build.outputs.digest }}

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-${{ matrix.binary }}.spdx.json
