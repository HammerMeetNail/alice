# ConfigMap holds all non-secret configuration. Adjust values for your deployment.
# Secrets (database URL, SMTP password, etc.) belong in secret.yaml — never here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alice-server
  namespace: alice
  labels:
    app.kubernetes.io/name: alice
    app.kubernetes.io/component: server
data:
  ALICE_LISTEN_ADDR: ":8080"
  ALICE_METRICS_ADDR: ":9090"
  ALICE_AUTH_TOKEN_TTL: "24h"
  ALICE_TLS_TERMINATED: "true"
  # Set to the CIDR(s) of your load balancer so real client IPs are used for
  # rate limiting. Example: ALICE_TRUSTED_PROXIES: "10.0.0.0/8"
  ALICE_TRUSTED_PROXIES: ""
  ALICE_RATE_LIMIT_AGENT_PER_MIN: "60"
  ALICE_SMTP_PORT: "587"
  ALICE_SMTP_TLS: "true"
  ALICE_SMTP_FROM: "alice@example.com"
  # Set ALICE_SMTP_HOST to your SMTP server hostname (or "noop" for local dev).
  ALICE_SMTP_HOST: ""
  ALICE_ADMIN_UI_ENABLED: "false"
---
# Secret holds sensitive values. In production, populate this from your secrets
# manager (Vault, AWS Secrets Manager, Sealed Secrets, etc.) rather than
# committing literal values here.
#
# Generate base64 values with: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: alice-server
  namespace: alice
  labels:
    app.kubernetes.io/name: alice
    app.kubernetes.io/component: server
type: Opaque
data:
  # ALICE_DATABASE_URL: <base64-encoded postgres DSN>
  # ALICE_SMTP_USERNAME: <base64-encoded SMTP username>
  # ALICE_SMTP_PASSWORD: <base64-encoded SMTP password>
