<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FizzBuzz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  padding: 2rem;
}

.card {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 24px;
  padding: 2.5rem;
  width: 100%;
  max-width: 820px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
}

h1 {
  text-align: center;
  font-weight: 600;
  font-size: 2rem;
  letter-spacing: -0.02em;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 0.5rem;
}

.subtitle {
  text-align: center;
  color: rgba(255, 255, 255, 0.45);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-bottom: 1.75rem;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.82rem;
  color: rgba(255, 255, 255, 0.7);
}

.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
}

.cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 0.78rem;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.06);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: default;
  animation: fadeIn 0.5s ease backwards;
  user-select: none;
}

.cell:hover {
  transform: scale(1.12);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  z-index: 2;
}

.cell.number {
  color: rgba(255, 255, 255, 0.45);
}

.cell.fizz {
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  border-color: rgba(37, 99, 235, 0.4);
  color: #bfdbfe;
}

.cell.fizz:hover {
  box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
}

.cell.buzz {
  background: linear-gradient(135deg, #065f46, #059669);
  border-color: rgba(5, 150, 105, 0.4);
  color: #a7f3d0;
}

.cell.buzz:hover {
  box-shadow: 0 8px 24px rgba(5, 150, 105, 0.35);
}

.cell.fizzbuzz {
  background: linear-gradient(135deg, #6b21a8, #db2777);
  border-color: rgba(219, 39, 119, 0.4);
  color: #fbcfe8;
  font-size: 0.65rem;
}

.cell.fizzbuzz:hover {
  box-shadow: 0 8px 24px rgba(219, 39, 119, 0.35);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>
<div class="card">
  <h1>FizzBuzz</h1>
  <p class="subtitle">1 &rarr; 100</p>
  <div class="legend">
    <span class="legend-item"><span class="legend-swatch" style="background:linear-gradient(135deg,#1e3a8a,#2563eb)"></span> Fizz (×3)</span>
    <span class="legend-item"><span class="legend-swatch" style="background:linear-gradient(135deg,#065f46,#059669)"></span> Buzz (×5)</span>
    <span class="legend-item"><span class="legend-swatch" style="background:linear-gradient(135deg,#6b21a8,#db2777)"></span> FizzBuzz (×15)</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const grid = document.getElementById('grid');

for (let i = 1; i <= 100; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';

  if (i % 15 === 0) {
    cell.textContent = 'FizzBuzz';
    cell.classList.add('fizzbuzz');
  } else if (i % 5 === 0) {
    cell.textContent = 'Buzz';
    cell.classList.add('buzz');
  } else if (i % 3 === 0) {
    cell.textContent = 'Fizz';
    cell.classList.add('fizz');
  } else {
    cell.textContent = i;
    cell.classList.add('number');
  }

  cell.style.animationDelay = `${i * 12}ms`;
  grid.appendChild(cell);
}
</script>
</body>
</html>
